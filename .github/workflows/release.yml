name: Production Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Tests (Docker)
        run: docker compose -f docker-compose.e2e.yml up --build --exit-code-from e2e

      - name: Build Extension ZIP
        run: |
          zip -r streamelements-search-${{ github.ref_name }}.zip extension/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: streamelements-search-${{ github.ref_name }}.zip
          body_path: docs/CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
