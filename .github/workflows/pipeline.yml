name: Extension Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # JOB 1: Testes e Build
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ github.ref_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run E2E Tests (Docker)
        run: docker compose -f docker-compose.e2e.yml up --build --exit-code-from e2e

  # JOB 2: Publish Release - Run in tag v
  publish-release:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: streamelements-search-${{ github.ref_name }}.zip
          body_path: docs/CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Extension Zip
        run: |
          cd extension
          zip -r ../streamelements-leaderboard.zip ./* -x "*.git*"
          cd ..
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            cp streamelements-leaderboard.zip streamelements-search-${{ github.ref_name }}.zip
          fi

      - name: Verify ZIP Structure
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            cp streamelements-leaderboard.zip streamelements-search-${{ github.ref_name }}.zip
          else
            unzip -l streamelements-leaderboard.zip
          fi

      - name: Upload Artifact (Para conferência manual se necessário)
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: streamelements-leaderboard.zip
